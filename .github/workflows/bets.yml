name: Daily Bets

on:
  schedule:
    # Save picks: 9am ET = 2pm UTC (lines are up by then)
    - cron: '0 14 13-31 3 *'   # March 13-31
    - cron: '0 14 1-8  4 *'    # April 1-8
    # Pre-game refresh: 11am ET = 4pm UTC (injuries resolve 1-2h before tip, lines sharpen)
    - cron: '0 16 13-31 3 *'   # March 13-31
    - cron: '0 16 1-8  4 *'    # April 1-8
    # Evening refresh: 5pm ET = 10pm UTC (catch late-window game updates)
    - cron: '0 22 13-31 3 *'   # March 13-31
    - cron: '0 22 1-8  4 *'    # April 1-8
    # Settle: every 15 min from 12pm–2am ET (catches games within ~15 min of final buzzer)
    # 12pm ET = 17:00 UTC, 2am ET = 07:00 UTC next day
    - cron: '*/15 17-23,0-7 14-31 3 *'   # March
    - cron: '*/15 17-23,0-7 2-9 4 *'     # April
  workflow_dispatch:
    inputs:
      action:
        description: 'Which step to run'
        required: true
        default: 'both'
        type: choice
        options: [save, settle, both]

jobs:
  bets:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine action
        id: action
        run: |
          # Dispatch override takes priority
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "action=${{ inputs.action }}" >> $GITHUB_OUTPUT
            exit 0
          fi
          # Infer from cron time: 14/16/22 UTC = save windows, else settle
          HOUR=$(date -u +%H)
          if [ "$HOUR" -eq 14 ] || [ "$HOUR" -eq 16 ] || [ "$HOUR" -eq 22 ]; then
            echo "action=save" >> $GITHUB_OUTPUT
          else
            echo "action=settle" >> $GITHUB_OUTPUT
          fi

      - name: Settle yesterday's picks (best bets)
        if: steps.action.outputs.action == 'settle' || steps.action.outputs.action == 'both'
        run: python scripts/settle_bets.py --source espn || echo "Settle step failed (no pending picks or ESPN error)"

      - name: Settle yesterday's card picks
        if: steps.action.outputs.action == 'settle' || steps.action.outputs.action == 'both'
        run: python scripts/settle_card.py || echo "Card settle step failed (no pending picks)"

      - name: Refresh live injury data (ESPN, free)
        if: steps.action.outputs.action == 'save' || steps.action.outputs.action == 'both'
        run: python scripts/fetch_injuries_live.py 2026 --merge || echo "Injury refresh failed (non-fatal)"

      - name: Save today's picks (best bets)
        if: steps.action.outputs.action == 'save' || steps.action.outputs.action == 'both'
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python scripts/save_bets.py || echo "Save step failed (no games or API error)"

      - name: Save today's full card
        if: steps.action.outputs.action == 'save' || steps.action.outputs.action == 'both'
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python scripts/save_card.py || echo "Card save step failed (no games or API error)"

      - name: Print Odds API budget status
        run: python scripts/track_api_usage.py || echo "Usage tracker not initialized yet"

      - name: Commit ledger
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/bets_ledger.json data/card_ledger.json data/api_usage.json
          # Include daily card snapshot if written
          CARD_DAILY="data/card_$(date -u +%Y-%m-%d).json"
          if [ -f "$CARD_DAILY" ]; then git add "$CARD_DAILY"; fi
          # Include injury updates if changed
          if [ -f "data/injuries_2026.json" ]; then git add data/injuries_2026.json; fi
          # Include betting diagnostics if written
          DIAG="data/betting_diagnostics_$(date -u +%Y-%m-%d).json"
          if [ -f "$DIAG" ]; then git add "$DIAG"; fi
          if git diff --cached --quiet; then
            echo "No changes to ledger."
          else
            git commit -m "chore: update bets ledger $(date -u +%Y-%m-%d)"
            git push
          fi
