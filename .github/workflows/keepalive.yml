name: Keep-Alive Ping

on:
  schedule:
    - cron: '*/10 * * * *'   # Every 10 minutes, 24/7
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: |
          URL="${{ vars.RENDER_URL || 'https://bracket-brain.onrender.com' }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/health" --max-time 30)
          echo "Health check: $STATUS — $URL/health"
